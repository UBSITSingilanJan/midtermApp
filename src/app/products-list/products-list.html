<h2>Product List</h2>

<table>
  <tbody>
    @for (p of products; track p.id) {
      <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.status }}</td>
        <td>
          <a [routerLink]="[p.id, 'details']" class="btn-view">View</a>
        </td>
      </tr>
    }
  </tbody>
</table>

<div class="modal-container">
  <router-outlet></router-outlet>
</div>
