<h2>Suppliers Management</h2>

<table>
    <tbody>
        @for (s of supplier; track s.id) {
            <tr>
               <td>{{ s.id }}</td>
               <td>{{ s.supplierName }}</td> 
               <td>{{ s.contactPerson }}</td> 
               <td>
                <a [routerLink]="[s.id, 'supp-details']" class="btn-view">View</a>
               </td> 
            </tr>
        }
    </tbody>
</table>

<div class="modal-container">
    <router-outlet></router-outlet>
  </div>
