<div class="supplier-details" *ngIf="supplier">
  <h2>Supplier Detailsgi</h2>

  <div class="form-group">
    <label>Supplier Name</label>
    <input [(ngModel)]="supplier.supplierName">
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label>Location</label>
      <input [(ngModel)]="supplier.location">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="supplier.email">
    </div>
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label>Contact Person</label>
      <input [(ngModel)]="supplier.contactPerson">
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input [(ngModel)]="supplier.phone">
    </div>
  </div>

  <div class="form-group">
    <label>Products Supplied</label>
    <textarea [(ngModel)]="supplier.productsSupplied"></textarea>
  </div>

  <div class="actions">
    <button class="btn-save" (click)="saveSupplier()">Save</button>
    <button class="btn-cancel" (click)="goBack()">Cancel</button>
  </div>
</div>
